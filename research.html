// 테이블 생성 함수 (company로 변경)
function renderTable() {
  let html = `
    <table>
      <thead>
        <tr>
          <th>회사</th>
          <th>플랫폼</th>
          <th>주요 기능</th>
          <th>API 존재 여부</th>
          <th>특이사항</th>
          <th>조사 근거 URL</th>
        </tr>
      </thead>
      <tbody>
  `;

  data.groups.forEach(group => {
    group.platforms.forEach((platform, index) => {
      const isFirst = index === 0;
      const rowSpan = isFirst ? group.platforms.length : 0;

      html += `
        <tr>
          ${isFirst ? `<td class="company" rowspan="${rowSpan}">${group.company}</td>` : ''}
          <td>${platform.name}</td>
          <td>${platform.features.join('<br>')}</td>
          <td class="${platform.api_exists ? 'api-yes' : 'api-no'}">
            ${platform.api_exists ? 'Yes' : 'No'}
          </td>
          <td class="notes">${platform.notes}</td>
          <td class="url">
            <a href="${platform.evidence_url}" target="_blank">${platform.evidence_url}</a>
          </td>
        </tr>
      `;
    });
  });

  html += `
      </tbody>
    </table>
  `;

  document.getElementById('tableContainer').innerHTML = html;
}

window.onload = renderTable;
